<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosa Moleleki | Personal Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    
    <!-- Splash Screen Overlay -->
    <div class="splash-screen" id="splashScreen">
        <!-- Skeleton Loader -->
        <div class="skeleton-loader" id="skeletonLoader">
            <div class="skeleton-bar"></div>
            <div class="skeleton-bar" style="width: 80%;"></div>
            <div class="skeleton-bar short"></div>
        </div>

        <!-- Quote Container -->
        <div class="quote-container" id="quoteContainer">
            <h1 class="quote-text">"Design is intelligence made visible."</h1>
        </div>
    </div>

    <!-- Main Hero Section -->
    <main class="hero-section" id="heroSection">
        <div class="hero-content">
            <h1 class="hero-title">Mosa Moleleki</h1>
            <p class="hero-subtitle">Creative Developer & Designer</p>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
