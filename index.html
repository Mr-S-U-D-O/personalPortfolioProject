<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosa Moleleki | Personal Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    
    <!-- Splash Screen Overlay -->
    <div class="splash-screen" id="splashScreen">
        <!-- Skeleton Loader -->
        <div class="skeleton-loader" id="skeletonLoader">
            <div class="skeleton-bar"></div>
            <div class="skeleton-bar" style="width: 80%;"></div>
            <div class="skeleton-bar short"></div>
        </div>

        <!-- Quote Container -->
        <div class="quote-container" id="quoteContainer">
            <h1 class="quote-text">"Simplicity is the ultimate sophistication."</h1>
            <p class="quote-author">&mdash; Leonardo da Vinci</p>
        </div>
    </div>

    <!-- Main Hero Section -->
    <main class="hero-section" id="heroSection">
        
        <!-- Sidebar Navigation -->
        <nav class="sidebar-nav">
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#home" class="nav-link">
                        <span class="nav-icon"></span>
                        <span class="nav-text">Home</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#about" class="nav-link">
                        <span class="nav-icon"></span>
                        <span class="nav-text">About</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#projects" class="nav-link">
                        <span class="nav-icon"></span>
                        <span class="nav-text">Projects</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#contact" class="nav-link">
                        <span class="nav-icon"></span>
                        <span class="nav-text">Contact</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Hero Content Wrapper -->
        <div class="hero-layout-wrapper">
            
            <!-- Circular Image -->
            <div class="hero-image-container">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=400&h=400&auto=format&fit=crop" alt="Profile Image" class="hero-profile-img">
            </div>

            <!-- 5-Line Text Content -->
            <div class="hero-text-content">
                <p class="hero-line line-small"><span id="dynamicGreeting">Good morning</span>, I am...</p>
                <h1 class="hero-line line-large gradient-text">Mosa Moleleki</h1>
                <p class="hero-line line-small">and I am a...</p>
                <h2 class="hero-line line-large text-primary">Front-End Web Developer</h2>
                <p class="hero-line line-small text-muted">based in Johannesburg.</p>
            </div>

        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
