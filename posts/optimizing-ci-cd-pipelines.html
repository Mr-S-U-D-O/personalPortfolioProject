      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js?v=1773563875135"
    ></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        gsap.registerPlugin(ScrollTrigger);

        // 1. Progress Bar
        gsap.to("#postProgressBar", {
          width: "100%",
          ease: "none",
          scrollTrigger: {
            trigger: document.body,
            start: "top top",
            end: "bottom bottom",
            scrub: 0.2,
          },
        });

        // 2. Generate TOC & Calculate Reading Time
        const content = document.getElementById("postContent");
        const headings = content.querySelectorAll("h2, h3");
        const tocList = document.getElementById("tocList");

        // Reading time
        const text = content.innerText || content.textContent;
        const words = text.trim().split(/\s+/).length;
        const wpm = 225; // Average reading speed
        const time = Math.max(1, Math.ceil(words / wpm));
        document.getElementById("readingTime").innerHTML =
          `<i class="fa-regular fa-clock"></i> ${time} min read`;

        if (headings.length === 0) {
          document.querySelector(".post-toc").style.display = "none";
          if (document.querySelector(".trailing-line-wrapper")) {
            document.querySelector(".trailing-line-wrapper").style.display =
              "none";
          }
        } else {
          headings.forEach((heading, index) => {
            const id = heading.id || `heading-${index}`;
            heading.id = id;

            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = `#${id}`;
            a.textContent = heading.textContent;
            if (heading.tagName.toLowerCase() === "h3") {
              a.style.paddingLeft = "15px";
              a.style.fontSize = "0.9rem";
            }
            li.appendChild(a);
            tocList.appendChild(li);
          });

          // 3. Highlight TOC on Scroll
          const observerOptions = {
            root: null,
            rootMargin: "0px 0px -80% 0px",
            threshold: 0,
          };

          const tocLinks = tocList.querySelectorAll("a");

          const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                tocLinks.forEach((link) => {
                  link.classList.remove("active");
                  if (link.getAttribute("href") === `#${entry.target.id}`) {
                    link.classList.add("active");
                  }
                });
              }
            });
          }, observerOptions);

          headings.forEach((h) => observer.observe(h));

          // Smooth scroll for TOC links
          tocLinks.forEach((link) => {
            link.addEventListener("click", (e) => {
              e.preventDefault();
              const targetId = link.getAttribute("href").substring(1);
              const targetEl = document.getElementById(targetId);
              if (targetEl) {
                const yOffset = -80;
                const y =
                  targetEl.getBoundingClientRect().top +
                  window.pageYOffset +
                  yOffset;
                window.scrollTo({ top: y, behavior: "smooth" });
              }
            });
          });
        }

        // 4. Trailing Line Animation (Snake SVG)
        const snakeFill = document.getElementById("snakeFill");
        if (snakeFill && headings.length > 0) {
          const length = snakeFill.getTotalLength();
          gsap.set(snakeFill, {
            strokeDasharray: length,
            strokeDashoffset: length,
          });

          gsap.to(snakeFill, {
            strokeDashoffset: 0,
            ease: "none",
            scrollTrigger: {
              trigger: ".post-layout",
              start: "top 100px",
              end: "bottom center",
              scrub: 0.5,
            },
          });
        }

        // 5. Fade Up Elements on Scroll
        const fadeElements = document.querySelectorAll(
          ".fade-element, .post-content > h2, .post-content > p, .post-content > blockquote, .post-content > pre",
        );
        fadeElements.forEach((el) => {
          gsap.fromTo(
            el,
            { opacity: 0, y: 40 },
            {
              opacity: 1,
              y: 0,
              duration: 0.8,
              ease: "power3.out",
              scrollTrigger: {
                trigger: el,
                start: "top 85%",
                toggleActions: "play none none reverse",
              },
            },
          );
        });

        // 6. Copy Link Button
        const copyBtn = document.getElementById("copyLinkBtn");
        if (copyBtn) {
          copyBtn.addEventListener("click", () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
              const icon = copyBtn.querySelector("i");
              icon.className = "fa-solid fa-check";
              setTimeout(() => {
                icon.className = "fa-solid fa-link";
              }, 2000);
            });
          });
        }
        // 7. Wire up universal theme toggle
        if (window.ThemeSystem) window.ThemeSystem.init();
      });
    </script>
